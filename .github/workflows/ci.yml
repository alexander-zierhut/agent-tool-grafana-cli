name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, hermetic unit tests across every supported Python. This is the tier
  # that actually guards a PR: it needs no server, no token and no network, so it
  # cannot be skipped, flake, or be quietly disabled by a missing secret.
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[test]'
      # The MARKER selects the hermetic set — never a file list, which silently
      # fails to grow when someone adds a test file. (The sibling OpenProject CLI
      # ran 30 of its 144 hermetic tests this way while claiming to run them all.)
      - name: Unit tests (no server, no network)
        run: python -m pytest -m "not integration" -q

  # The full suite against a real Grafana + Loki + Prometheus, booted here.
  #
  # NO SECRETS, and that is the design. An earlier version of this job pointed at
  # the maintainer's production Grafana behind repository secrets, which meant it
  # could not run on a pull request (a fork cannot read secrets, and must never
  # reach production anyway), could only ever be read-only, and "passed" by
  # skipping everywhere else. A job that mostly skips is a job that protects
  # nothing.
  #
  # Booting our own stack instead means PRs from forks get the same coverage as
  # main, and the tests can WRITE: create dashboards, create alert rules, watch a
  # real rule fire into a receiver that cannot deliver. That write half is most of
  # the CLI, and against somebody's production it is untestable by construction.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[test]'

      - name: Boot Grafana + Loki + Prometheus
        run: docker compose up -d --wait

      - name: Seed orgs, roles, datasources, logs and alerts
        # Writes the whole test environment to $GITHUB_ENV, including
        # GRAFANA_ALLOW_WRITES — the interlock that lets the destructive tests run
        # here and nowhere else.
        run: ./scripts/bootstrap_test_stack.sh

      - name: Full suite (hermetic + live + roles + writes)
        # No `-m` filter: the whole point of booting a real stack is to run
        # EVERYTHING against it.
        run: python -m pytest -q -rs

      - name: Fail if the live tiers silently skipped
        # A skipped live test is indistinguishable from a passing one in the
        # summary line, so a broken bootstrap would show up as a green run that
        # tested nothing. Assert the tiers actually executed.
        run: |
          python -m pytest -m integration -q --collect-only | tail -1
          python -m pytest -m integration -q -rs 2>&1 | tee /tmp/live.log
          if grep -qE "^SKIPPED|s +\[" /tmp/live.log; then
            echo "::error::live tests skipped despite a booted stack — the bootstrap is broken"
            grep "SKIPPED" /tmp/live.log || true
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=80

  # Verify the distributables build and actually run.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The package + its runtime deps, so PyInstaller has everything to bundle.
      - run: pip install -e '.[build]' build
      - name: Build wheel + sdist
        run: |
          python -m build
          ls -l dist
      - name: Install the wheel into a clean venv and smoke-test
        run: |
          # A clean venv, because `pip install -e .` in the job venv would make a
          # broken wheel look installable — the entry point would resolve from the
          # source tree either way.
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
          /tmp/clean/bin/grafana-cli --version
      - name: Build the single-file binary
        run: python scripts/build_binary.py
      - name: Smoke-test the binary
        run: ./dist/grafana-cli --version
      # The guide is what an agent runs FIRST, with no config and no token. If it
      # can fail on a missing config dir, the tool is unusable exactly when it is
      # most needed — so prove it in the shipped artifact, not just in pytest.
      - name: The guide must work with no config, no token, no HOME
        run: env -i PATH=/usr/bin:/bin HOME=/nonexistent ./dist/grafana-cli guide > /dev/null

  # Generated docs can never drift: regenerate, then fail if anything changed.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Regenerate docs/COMMANDS.md
        run: python scripts/gen_docs.py
      - name: Fail if the committed docs are stale
        run: |
          # `add -N` registers any brand-new file with the index so `git diff`
          # sees it. Without it an entirely uncommitted docs/COMMANDS.md is
          # untracked, diffs clean, and this check passes while shipping no docs.
          git add -N docs/
          git diff --exit-code docs/ || {
            echo "::error::docs/COMMANDS.md is out of date — run: python scripts/gen_docs.py"
            exit 1
          }
