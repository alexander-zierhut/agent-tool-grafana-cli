name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token stored
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # Read the version from the BUILT WHEEL, not by importing the package: this
      # job installs only `build`, so `import grafanacli` would die on httpx/rich.
      # (That exact mistake cost the shared repo a release run.) Reading the
      # artifact also validates the precise file being uploaded.
      - name: Tag must match the built version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          WHL=$(ls dist/*.whl)
          BUILT=$(basename "$WHL" | cut -d- -f2)
          TAG="${GITHUB_REF_NAME#v}"
          echo "built=$BUILT tag=$TAG  ($(basename "$WHL"))"
          [ "$BUILT" = "$TAG" ] || { echo "::error::tag v$TAG != built version $BUILT"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running a release (to fix a failed per-platform binary, say) must
          # not die on "File already exists" for a version that published fine.
          # A forgotten bump is still caught by the guard above.
          skip-existing: true

      - name: Attach dists to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # Per-platform binaries attach independently, so a slow or failing runner never
  # blocks the others or the PyPI publish.
  binary:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  asset: graf-linux-x86_64 }
          - { os: macos-latest,   asset: graf-macos-arm64 }
          - { os: macos-13,       asset: graf-macos-x86_64 }
          - { os: windows-latest, asset: graf-windows-x86_64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[build]"
      - name: Build the single-file binary
        run: python scripts/build_binary.py --output "${{ matrix.asset }}"
      - name: Smoke-test it
        shell: bash
        run: ./dist/"${{ matrix.asset }}" --version
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
